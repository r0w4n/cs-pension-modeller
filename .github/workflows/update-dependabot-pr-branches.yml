name: Update Dependabot PR branches

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-dependabot-pr-branches
  cancel-in-progress: true

jobs:
  update-dependabot-prs:
    runs-on: ubuntu-latest

    steps:
      - name: Update open Dependabot PR branches
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              base: 'main',
              per_page: 100
            });

            for (const pr of pulls) {
              if (pr.user.login !== 'dependabot[bot]') {
                continue;
              }

              console.log(`Updating Dependabot PR #${pr.number}: ${pr.title}`);

              try {
                await github.rest.pulls.updateBranch({
                  owner,
                  repo,
                  pull_number: pr.number
                });
              } catch (error) {
                console.log(
                  `Could not update PR #${pr.number}: ${error.status} ${error.message}`
                );
              }
            }
