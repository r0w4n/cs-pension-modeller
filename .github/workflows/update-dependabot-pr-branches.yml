name: Update Dependabot PR branches

on:
  push:
    branches:
      - main
  schedule:
    - cron: "43 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-dependabot-pr-branches
  cancel-in-progress: true

jobs:
  update-dependabot-prs:
    runs-on: ubuntu-latest
    env:
      DEPENDABOT_AUTOMATION_TOKEN: ${{ secrets.DEPENDABOT_AUTOMATION_TOKEN }}

    steps:
      - name: Check automation token
        run: |
          if [ -z "$DEPENDABOT_AUTOMATION_TOKEN" ]; then
            echo "::error::Set DEPENDABOT_AUTOMATION_TOKEN to a fine-grained PAT or GitHub App token with Contents and Pull requests write access. Using GITHUB_TOKEN here can leave PR workflow runs waiting for manual approval."
            exit 1
          fi

      - name: Update open Dependabot PR branches
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.DEPENDABOT_AUTOMATION_TOKEN }}
          script: |
            const { owner, repo } = context.repo;

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              base: 'main',
              per_page: 100
            });

            for (const pr of pulls) {
              if (pr.user.login !== 'dependabot[bot]') {
                continue;
              }

              console.log(`Updating Dependabot PR #${pr.number}: ${pr.title}`);

              try {
                await github.rest.pulls.updateBranch({
                  owner,
                  repo,
                  pull_number: pr.number,
                  expected_head_sha: pr.head.sha
                });
              } catch (error) {
                if (error.status === 422) {
                  core.notice(
                    `Skipped PR #${pr.number}: ${error.message}`
                  );
                  continue;
                }

                throw error;
              }
            }
