name: Dependabot auto-merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Enable auto-merge for Dependabot PRs
        run: |
          auto_merge_request="$(gh pr view "$PR_URL" --json autoMergeRequest --jq '.autoMergeRequest')"
          is_draft="$(gh pr view "$PR_URL" --json isDraft --jq '.isDraft')"
          merge_state="$(gh pr view "$PR_URL" --json mergeStateStatus --jq '.mergeStateStatus')"

          if [ "$auto_merge_request" != "null" ]; then
            echo "Auto-merge is already enabled for $PR_URL."
            exit 0
          fi

          if [ "$is_draft" = "true" ]; then
            echo "::notice::Skipping draft Dependabot PR $PR_URL."
            exit 0
          fi

          if [ "$merge_state" = "DIRTY" ]; then
            echo "::notice::Skipping Dependabot PR $PR_URL because it has merge conflicts."
            exit 0
          fi

          gh pr merge --auto --merge --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
